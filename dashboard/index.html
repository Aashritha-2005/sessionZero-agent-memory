<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>cognee-agent-memory — Timeline</title>
<style>
  :root {
    --high: #1e8e3e;
    --medium: #b58105;
    --low: #c5221f;
    --forgotten: #9aa0a6;
    --bg: #0f1115;
    --card: #171a21;
    --border: #2a2f3a;
    --text: #e8eaed;
    --muted: #9aa0a6;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  header h1 { font-size: 18px; margin: 0; }
  header p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  input[type=text] {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 6px;
    width: 320px;
    font-size: 13px;
  }
  button {
    background: #2f6feb;
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  button.danger { background: var(--low); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  main { padding: 24px 28px; max-width: 980px; margin: 0 auto; }
  .legend { display: flex; gap: 18px; margin-bottom: 18px; font-size: 12px; color: var(--muted); }
  .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 6px; }
  .timeline-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 4px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 10px;
    transition: opacity 0.2s;
  }
  .timeline-item.forgotten { opacity: 0.45; }
  .timeline-item.HIGH { border-left-color: var(--high); }
  .timeline-item.MEDIUM { border-left-color: var(--medium); }
  .timeline-item.LOW { border-left-color: var(--low); }
  .row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .title { font-size: 14px; font-weight: 600; }
  .meta { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .badge {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 10px;
    white-space: nowrap;
  }
  .badge.HIGH { background: rgba(30,142,62,0.18); color: var(--high); }
  .badge.MEDIUM { background: rgba(181,129,5,0.18); color: var(--medium); }
  .badge.LOW { background: rgba(197,34,31,0.18); color: var(--low); }
  .badge.forgotten { background: rgba(154,160,168,0.18); color: var(--forgotten); }
  .provenance {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed var(--border);
    font-size: 12px;
    color: var(--muted);
    display: none;
  }
  .provenance.open { display: block; }
  .provenance code { color: #8ab4f8; }
  .signals span { margin-right: 12px; }
  .actions { display: flex; gap: 8px; margin-top: 10px; }
  .actions button { font-size: 11px; padding: 4px 10px; }
  .warn { color: var(--low); font-weight: 600; }
</style>
</head>
<body>
<header>
  <div>
    <h1>cognee-agent-memory — Memory Timeline</h1>
    <p>Real Cognee Cloud data, dataset <code id="dsname">shiftlog_demo</code></p>
  </div>
  <div class="controls">
    <input type="text" id="query" placeholder="Search recall (e.g. 'Does ShiftLog use JWT?')" />
    <button onclick="runRecall()">Recall</button>
    <button onclick="loadTimeline()">Refresh timeline</button>
  </div>
</header>
<main>
  <div class="legend">
    <span><span class="dot" style="background:var(--high)"></span>HIGH confidence</span>
    <span><span class="dot" style="background:var(--medium)"></span>MEDIUM confidence</span>
    <span><span class="dot" style="background:var(--low)"></span>LOW — verify before trusting</span>
    <span><span class="dot" style="background:var(--forgotten)"></span>forgotten (pruned)</span>
  </div>
  <div id="status" class="meta"></div>
  <div id="list"></div>
</main>

<script>
const API_BASE = "http://127.0.0.1:8000";

function levelOf(label) {
  if (label.startsWith("HIGH")) return "HIGH";
  if (label.startsWith("MEDIUM")) return "MEDIUM";
  return "LOW";
}

function renderItem(e, isRecallResult) {
  const level = levelOf(e.label);
  const forgotten = e.status === "forgotten";
  const div = document.createElement("div");
  div.className = `timeline-item ${level} ${forgotten ? "forgotten" : ""}`;

  const title = isRecallResult
    ? (e.text || "").split("\n")[0]
    : e.title;

  div.innerHTML = `
    <div class="row">
      <div>
        <div class="title">${title}</div>
        <div class="meta">${e.kind || ""} · commit <code>${e.source_commit}</code> ${e.timestamp ? "· " + new Date(e.timestamp).toLocaleDateString() : ""}</div>
      </div>
      <div>
        ${forgotten ? '<span class="badge forgotten">FORGOTTEN</span>' : `<span class="badge ${level}">${e.label}</span>`}
      </div>
    </div>
    <div class="provenance">
      <div class="signals">
        <span>path: ${e.signals.path_length_score.toFixed(2)}</span>
        <span>similarity: ${e.signals.similarity_score.toFixed(2)}</span>
        <span>recency: ${e.signals.recency_score.toFixed(2)}</span>
        <span>contradiction: ${e.signals.contradiction_penalty.toFixed(2)}</span>
      </div>
      ${e.files ? `<div>files: ${e.files.join(", ")}</div>` : ""}
      ${e.superseded_by && e.superseded_by.length ? `<div class="warn">superseded by: ${e.superseded_by.join(", ")}</div>` : ""}
      ${e.data_id ? `<div>data_id: <code>${e.data_id}</code></div>` : ""}
      <div class="actions">
        <button onclick='toggleProv(this)'>hide provenance</button>
        ${!forgotten && !isRecallResult ? `<button class="danger" onclick="forgetMemory('${e.source_commit}', this)">forget this</button>` : ""}
      </div>
    </div>
  `;

  div.querySelector(".title").parentElement.parentElement
    .insertAdjacentHTML("beforeend", "");

  div.addEventListener("click", (ev) => {
    if (ev.target.tagName === "BUTTON") return;
    const prov = div.querySelector(".provenance");
    prov.classList.toggle("open");
  });

  return div;
}

function toggleProv(btn) {
  const prov = btn.closest(".provenance");
  prov.classList.remove("open");
}

async function loadTimeline() {
  setStatus("Loading timeline…");
  const res = await fetch(`${API_BASE}/timeline`);
  const data = await res.json();
  document.getElementById("dsname").textContent = data.dataset;
  const list = document.getElementById("list");
  list.innerHTML = "";
  data.entries.forEach(e => list.appendChild(renderItem(e, false)));
  setStatus(`${data.count} memories · dataset "${data.dataset}"`);
}

async function runRecall() {
  const q = document.getElementById("query").value.trim();
  if (!q) return loadTimeline();
  setStatus(`Querying recall_service for: "${q}"…`);
  const res = await fetch(`${API_BASE}/recall?query=${encodeURIComponent(q)}&top_k=10`);
  const data = await res.json();
  const list = document.getElementById("list");
  list.innerHTML = "";
  data.results.forEach(e => list.appendChild(renderItem(e, true)));
  setStatus(`${data.results.length} result(s) for "${q}"`);
}

async function forgetMemory(commit, btn) {
  if (!confirm(`Really call real forget() on commit ${commit}? This removes it from the live Cognee graph.`)) return;
  btn.disabled = true;
  btn.textContent = "forgetting…";
  try {
    const res = await fetch(`${API_BASE}/forget?commit=${encodeURIComponent(commit)}`, { method: "POST" });
    if (!res.ok) throw new Error(await res.text());
    await loadTimeline();
  } catch (err) {
    alert("forget() failed: " + err);
    btn.disabled = false;
    btn.textContent = "forget this";
  }
}

function setStatus(msg) {
  document.getElementById("status").textContent = msg;
}

loadTimeline();
</script>
</body>
</html>
